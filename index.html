<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Archery — Data Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --night:#0D1B2A;
      --night-mid:#162233;
      --night-light:#1E3048;
      --gold:#C8973A;
      --gold-bright:#E5B04A;
      --cream:#F0EEE9;
      --muted:#8A9BB0;
      --red:#C53030;
      --green:#2D7A4F;
      --border:rgba(200,151,58,0.18);
      --radius:12px;
    }

    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:var(--night);color:var(--cream);min-height:100vh;overflow-x:hidden}

    /* ── NAV ── */
    nav{
      display:flex;align-items:center;gap:0;
      background:var(--night-mid);border-bottom:1px solid var(--border);
      padding:0 6vw;position:sticky;top:0;z-index:50;
    }
    .nav-brand{
      font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.06em;
      color:var(--cream);padding:14px 24px 14px 0;border-right:1px solid var(--border);margin-right:4px;
      white-space:nowrap;
    }
    .nav-brand span{color:var(--gold)}
    .nav-tab{
      padding:16px 20px;font-size:13px;font-weight:600;cursor:pointer;
      color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;
      transition:color .2s,border-color .2s;white-space:nowrap;
    }
    .nav-tab.active{color:var(--cream);border-bottom-color:var(--gold)}
    .nav-tab:hover:not(.active){color:var(--cream)}

    /* ── PAGE SECTIONS ── */
    .page{display:none}
    .page.active{display:block}

    /* ── HERO ── */
    .hero{
      position:relative;display:flex;align-items:center;
      justify-content:space-between;padding:48px 6vw 40px;
      overflow:hidden;border-bottom:1px solid var(--border);
    }
    .hero::before{
      content:'';position:absolute;inset:0;
      background:radial-gradient(ellipse at 75% 50%,rgba(200,151,58,.07) 0%,transparent 70%);
      pointer-events:none;
    }
    .hero-text{max-width:520px;z-index:1}
    .hero-eyebrow{
      font-size:11px;font-weight:600;letter-spacing:.2em;
      text-transform:uppercase;color:var(--gold);margin-bottom:14px;
    }
    .hero-title{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(44px,6vw,82px);line-height:.92;
      color:var(--cream);letter-spacing:.02em;
    }
    .hero-title span{color:var(--gold)}
    .hero-sub{margin-top:16px;font-size:14px;color:var(--muted);line-height:1.6;max-width:400px}

    /* ── CORRECT WA TARGET ── */
    .target-wrap{position:relative;width:240px;height:240px;flex-shrink:0;z-index:1}
    @keyframes targetPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.012)}}
    .target-svg{width:100%;height:100%;animation:targetPulse 4s ease-in-out infinite}
    .arrow-hit{
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-62%) rotate(170deg);
      animation:arrowIn .7s cubic-bezier(.22,1,.36,1) .5s both;
    }
    @keyframes arrowIn{
      from{transform:translate(-50%,-220%) rotate(170deg);opacity:0}
      to{transform:translate(-50%,-62%) rotate(170deg);opacity:1}
    }

    /* ── STATS BAR ── */
    .stats-bar{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:1px;margin:24px 6vw 0;
      background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;
    }
    .stat-card{background:var(--night-mid);padding:18px 22px;display:flex;flex-direction:column;gap:4px}
    .stat-value{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--gold);line-height:1}
    .stat-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

    /* ── CONTROLS ── */
    .controls{padding:28px 6vw 0;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
    .control-group{display:flex;flex-direction:column;gap:5px}
    .control-group label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    input,select{
      background:var(--night-mid);border:1px solid var(--border);color:var(--cream);
      font-family:'Inter',sans-serif;font-size:13px;padding:9px 13px;border-radius:8px;
      outline:none;transition:border-color .2s;min-width:130px;
    }
    input::placeholder{color:var(--muted)}
    input:focus,select:focus{border-color:var(--gold)}
    select option{background:var(--night-mid)}
    .btn{
      background:var(--gold);color:var(--night);border:none;
      font-family:'Inter',sans-serif;font-size:12px;font-weight:700;
      letter-spacing:.07em;text-transform:uppercase;padding:10px 20px;
      border-radius:8px;cursor:pointer;transition:background .2s,transform .1s;align-self:flex-end;
    }
    .btn:hover{background:var(--gold-bright)}
    .btn:active{transform:scale(.97)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-ghost{
      background:var(--night-mid);color:var(--muted);border:1px solid var(--border);
      font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
      letter-spacing:.06em;text-transform:uppercase;padding:9px 18px;
      border-radius:8px;cursor:pointer;transition:all .2s;align-self:flex-end;
    }
    .btn-ghost:hover{border-color:var(--gold);color:var(--cream)}

    /* ── SECTION ── */
    .section{padding:32px 6vw 0}
    .section-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.04em;color:var(--cream)}
    .section-line{flex:1;height:1px;background:var(--border)}
    .section-count{
      font-size:11px;font-weight:600;color:var(--muted);
      background:var(--night-mid);padding:3px 10px;border-radius:20px;border:1px solid var(--border);
    }

    /* ── TABS ── */
    .tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--night-mid);
          padding:4px;border-radius:10px;border:1px solid var(--border);width:fit-content}
    .tab{
      padding:7px 16px;border-radius:7px;font-size:12px;font-weight:600;
      cursor:pointer;color:var(--muted);transition:all .2s;border:none;background:none;
    }
    .tab.active{background:var(--gold);color:var(--night)}
    .tab:hover:not(.active){color:var(--cream)}

    /* ── COMPETITION CARDS ── */
    .comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
    .comp-card{
      background:var(--night-mid);border:1px solid var(--border);border-radius:var(--radius);
      padding:20px;cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s;
      position:relative;overflow:hidden;
    }
    .comp-card::before{
      content:'';position:absolute;top:0;left:0;width:3px;height:100%;
      background:var(--gold);opacity:0;transition:opacity .2s;
    }
    .comp-card:hover{border-color:rgba(200,151,58,.5);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4)}
    .comp-card:hover::before{opacity:1}
    .comp-card.live{border-color:rgba(197,48,48,.5)}
    .comp-card.live::before{background:var(--red);opacity:1}
    .comp-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .comp-name{font-size:14px;font-weight:600;line-height:1.3;color:var(--cream);flex:1;padding-right:8px}
    .badge{
      font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
      padding:3px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;
    }
    .badge-live{background:rgba(197,48,48,.2);color:#FC8181;border:1px solid rgba(197,48,48,.4)}
    .badge-upcoming{background:rgba(200,151,58,.15);color:var(--gold);border:1px solid rgba(200,151,58,.3)}
    .badge-finished{background:rgba(45,122,79,.15);color:#68D391;border:1px solid rgba(45,122,79,.3)}
    .badge-wre{background:rgba(200,151,58,.12);color:var(--gold);border:1px solid var(--border);margin-left:4px}
    .comp-level{font-size:11px;font-weight:500;color:var(--gold);margin-bottom:8px}
    .comp-meta{display:flex;gap:14px;flex-wrap:wrap}
    .comp-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}

    /* ── ATHLETES ── */
    .athlete-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
    .athlete-card{
      background:var(--night-mid);border:1px solid var(--border);border-radius:var(--radius);
      padding:20px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;
    }
    .athlete-card:hover{border-color:rgba(200,151,58,.5);transform:translateY(-2px)}
    .athlete-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
    .athlete-avatar{
      width:48px;height:48px;border-radius:50%;background:var(--night-light);
      border:2px solid var(--border);display:flex;align-items:center;justify-content:center;
      font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);
      flex-shrink:0;overflow:hidden;
    }
    .athlete-avatar img{width:100%;height:100%;object-fit:cover}
    .athlete-name{font-size:15px;font-weight:700;color:var(--cream)}
    .athlete-noc{font-size:12px;color:var(--muted);margin-top:2px}
    .athlete-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .athlete-stat{background:var(--night-light);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
    .athlete-stat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);line-height:1}
    .athlete-stat-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:2px}
    .athlete-cat{display:flex;gap:4px;flex-wrap:wrap;margin-top:12px}
    .cat-pill{
      font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
      padding:2px 8px;border-radius:20px;background:var(--night-light);
      border:1px solid var(--border);color:var(--muted);
    }
    .rank-change{font-size:11px;font-weight:600}
    .rank-up{color:#68D391}
    .rank-down{color:#FC8181}
    .rank-same{color:var(--muted)}

    /* ── ATHLETE DETAIL PANEL ── */
    .detail-panel{
      position:fixed;right:0;top:0;bottom:0;width:min(500px,100vw);
      background:var(--night-light);border-left:1px solid var(--border);
      z-index:100;overflow-y:auto;transform:translateX(100%);
      transition:transform .3s cubic-bezier(.22,1,.36,1);padding:28px;
    }
    .detail-panel.open{transform:translateX(0)}
    .panel-close{
      position:absolute;top:14px;right:14px;background:var(--night-mid);
      border:1px solid var(--border);color:var(--muted);width:32px;height:32px;
      border-radius:50%;cursor:pointer;font-size:16px;display:flex;
      align-items:center;justify-content:center;transition:color .2s;
    }
    .panel-close:hover{color:var(--cream)}
    .panel-athlete-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-right:40px}
    .panel-avatar-lg{
      width:72px;height:72px;border-radius:50%;background:var(--night-mid);
      border:2px solid var(--border);display:flex;align-items:center;justify-content:center;
      font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);flex-shrink:0;overflow:hidden;
    }
    .panel-avatar-lg img{width:100%;height:100%;object-fit:cover}
    .panel-name{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1.05}
    .panel-noc{font-size:13px;color:var(--muted);margin-top:2px}
    .panel-divider{height:1px;background:var(--border);margin:16px 0}
    .results-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
    .result-item{
      background:var(--night-mid);border-radius:8px;padding:12px;
      border:1px solid var(--border);display:flex;align-items:center;gap:12px;
    }
    .result-rank{
      font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);
      width:36px;text-align:center;flex-shrink:0;line-height:1;
    }
    .result-rank.gold-medal{color:#F7DC6F}
    .result-rank.silver-medal{color:#BDC3C7}
    .result-rank.bronze-medal{color:#E67E22}
    .result-info{flex:1}
    .result-name{font-size:13px;font-weight:600;color:var(--cream)}
    .result-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .result-cat{
      font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
      padding:2px 7px;border-radius:4px;background:var(--night-light);
      border:1px solid var(--border);color:var(--muted);flex-shrink:0;
    }
    .panel-section-title{
      font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      color:var(--muted);margin-bottom:10px;
    }
    .ranking-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
    .ranking-item{
      background:var(--night-mid);border-radius:8px;padding:12px;
      border:1px solid var(--border);text-align:center;
    }
    .ranking-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);line-height:1}
    .ranking-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:3px}
    .ranking-pts{font-size:12px;color:var(--muted);margin-top:2px}

    /* ── COUNTRIES / RECORDS ── */
    .country-search-bar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;
      padding:28px 6vw 0;
    }
    .countries-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
    .country-item{
      background:var(--night-mid);border:1px solid var(--border);border-radius:var(--radius);
      padding:16px 18px;cursor:pointer;transition:border-color .2s,transform .15s;
      display:flex;align-items:center;gap:12px;
    }
    .country-item:hover{border-color:rgba(200,151,58,.5);transform:translateY(-1px)}
    .country-item.selected{border-color:var(--gold);background:var(--night-light)}
    .country-noc{
      font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);
      width:42px;text-align:center;flex-shrink:0;
    }
    .country-name-txt{font-size:13px;font-weight:600;color:var(--cream)}
    .country-results-count{font-size:11px;color:var(--muted);margin-top:2px}

    /* Records display */
    .records-panel{padding:24px 6vw 48px}
    .record-country-header{
      display:flex;align-items:center;gap:16px;margin-bottom:24px;
      padding-bottom:16px;border-bottom:1px solid var(--border);
    }
    .record-noc-big{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--gold);line-height:1}
    .record-country-name{font-size:20px;font-weight:700;color:var(--cream)}
    .record-country-sub{font-size:13px;color:var(--muted);margin-top:4px}
    .records-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
    .record-card{
      background:var(--night-mid);border:1px solid var(--border);border-radius:var(--radius);
      padding:18px;
    }
    .record-event{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
    .record-score{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--cream);line-height:1}
    .record-athlete{font-size:13px;font-weight:600;color:var(--cream);margin-top:6px}
    .record-meta{font-size:11px;color:var(--muted);margin-top:4px}
    .record-comp{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic}

    /* Medal table */
    .medal-table{width:100%;border-collapse:collapse;font-size:13px}
    .medal-table th{
      font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      color:var(--muted);padding:8px 12px;text-align:left;
      border-bottom:1px solid var(--border);
    }
    .medal-table td{padding:10px 12px;border-bottom:1px solid rgba(200,151,58,.06)}
    .medal-table tr:hover td{background:var(--night-light)}
    .medal-table td.center{text-align:center}
    .medal-gold{color:#F7DC6F;font-weight:700}
    .medal-silver{color:#BDC3C7;font-weight:700}
    .medal-bronze{color:#E67E22;font-weight:700}
    .rnk-badge{
      font-family:'Bebas Neue',sans-serif;font-size:14px;
      background:var(--night-light);padding:2px 8px;border-radius:4px;color:var(--muted);
    }

    /* ── LOADING / EMPTY ── */
    .state-box{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:12px;padding:48px 20px;color:var(--muted);text-align:center;
    }
    .state-box svg{opacity:.4}
    .state-box p{font-size:14px}
    .spinner{
      width:36px;height:36px;border:3px solid var(--border);
      border-top-color:var(--gold);border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── PAGINATION ── */
    .pagination{display:flex;gap:6px;justify-content:center;padding:28px 0 40px;align-items:center}
    .page-btn{
      background:var(--night-mid);border:1px solid var(--border);color:var(--muted);
      padding:7px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;
      transition:all .2s;
    }
    .page-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
    .page-btn.active{background:var(--gold);color:var(--night);border-color:var(--gold)}
    .page-btn:disabled{opacity:.3;cursor:not-allowed}
    .page-info{font-size:12px;color:var(--muted)}

    /* ── OVERLAY ── */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99;
      opacity:0;pointer-events:none;transition:opacity .3s;
    }
    .overlay.show{opacity:1;pointer-events:all}

    @media(max-width:640px){
      .hero{flex-direction:column;gap:24px}
      .target-wrap{width:180px;height:180px}
      .controls,.country-search-bar{flex-direction:column}
      input,select{min-width:unset;width:100%}
    }

    /* ── NOTICE ── */
    .api-notice{
      background:rgba(200,151,58,.08);border:1px solid rgba(200,151,58,.2);
      border-radius:8px;padding:10px 16px;font-size:12px;color:var(--muted);
      margin:16px 6vw 0;line-height:1.5;
    }
    .api-notice strong{color:var(--gold)}

    /* ── RECORDS SUB-NAV ── */
    .rec-subnav{
      padding:14px 22px;font-size:13px;font-weight:600;cursor:pointer;
      color:var(--muted);border:none;background:none;
      border-bottom:2px solid transparent;transition:color .2s,border-color .2s;
    }
    .rec-subnav.active{color:var(--cream);border-bottom-color:var(--gold)}
    .rec-subnav:hover:not(.active){color:var(--cream)}

    /* ── NOC CHIPS ── */
    .noc-chip{
      font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.06em;
      padding:5px 12px;border-radius:6px;cursor:pointer;
      background:var(--night-mid);border:1px solid var(--border);color:var(--muted);
      transition:all .15s;
    }
    .noc-chip:hover{border-color:var(--gold);color:var(--gold)}

    /* ── RECORDS TABLE ── */
    .records-section{padding:28px 6vw 0}
    .rec-group{margin-bottom:36px}
    .rec-group-title{
      font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;
      color:var(--cream);margin-bottom:12px;
      display:flex;align-items:center;gap:10px;
    }
    .rec-group-disc{
      font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
      color:var(--gold);background:rgba(200,151,58,.12);
      border:1px solid rgba(200,151,58,.25);padding:3px 9px;border-radius:4px;
    }
    table.rec-table{width:100%;border-collapse:collapse;font-size:13px}
    table.rec-table th{
      font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      color:var(--muted);padding:8px 12px;text-align:left;
      border-bottom:1px solid var(--border);white-space:nowrap;
    }
    table.rec-table td{
      padding:11px 12px;border-bottom:1px solid rgba(200,151,58,.06);
      vertical-align:middle;
    }
    table.rec-table tr:hover td{background:var(--night-light)}
    table.rec-table .score-cell{
      font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);
      line-height:1;white-space:nowrap;
    }
    table.rec-table .cat-cell{
      font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      padding:2px 8px;border-radius:4px;background:var(--night-light);
      border:1px solid var(--border);color:var(--muted);display:inline-block;
    }
    table.rec-table .event-cell{font-weight:600;color:var(--cream)}
    table.rec-table .meta-cell{color:var(--muted);font-size:12px}
    table.rec-table .date-cell{color:var(--muted);font-size:12px;white-space:nowrap}
  </style>
</head>
<body>

<!-- NAVIGATION -->
<nav>
  <div class="nav-brand">WORLD <span>ARCHERY</span></div>
  <button class="nav-tab active" onclick="showPage('competitions',this)">Competitions</button>

<!-- ═══════════════════════════════════════════════ PAGE: COMPETITIONS ═══ -->
<div class="page active" id="page-competitions">

  <!-- HERO -->
  <header class="hero">
    <div class="hero-text">

      <p class="hero-sub">Competitions, athletes and world ranking data in real time from the official World Archery API.</p>
    </div>
    <!-- CORRECT WA TARGET: White(1-2), Black(3-4), Blue(5-6), Red(7-8), Yellow(9-10) -->

        <circle cx="120" cy="120" r="82" fill="none" stroke="#333333" stroke-width="0.8"/>
        <!-- Blue rings 5-6 -->
        <circle cx="120" cy="120" r="70" fill="#006CB7"/>
        <circle cx="120" cy="120" r="58" fill="none" stroke="#0059A0" stroke-width="0.8"/>

        <!-- X ring (inner 10) -->

        <!-- Cross hair -->
        <line x1="120" y1="113" x2="120" y2="127" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>
        <line x1="113" y1="120" x2="127" y2="120" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>

        <!-- Thin border -->

        <rect x="7" y="12" width="2" height="60" fill="#C8973A" rx="1"/>
        <polygon points="8,0 3,15 13,15" fill="#E5B04A"/>
        <rect x="5" y="68" width="6" height="3" fill="#8B7355" rx="1"/>
        <line x1="6" y1="72" x2="4" y2="80" stroke="#8B7355" stroke-width="1.5"/>
        <line x1="10" y1="72" x2="12" y2="80" stroke="#8B7355" stroke-width="1.5"/>
      </svg>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-value" id="statTotal">—</div><div class="stat-label">Total competitions</div></div>
    <div class="stat-card"><div class="stat-value" id="statLive" style="color:var(--red)">—</div><div class="stat-label">Live now</div></div>
    <div class="stat-card"><div class="stat-value" id="statUpcoming">—</div><div class="stat-label">Upcoming</div></div>
    <div class="stat-card"><div class="stat-value" id="statWRE">—</div><div class="stat-label">World Ranking Events</div></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="control-group">
      <label>Search</label>
      <input type="text" id="compSearch" placeholder="Search competitions …"/>
    </div>
    <div class="control-group">
      <label>From</label>
      <input type="date" id="compStart"/>

    <div class="control-group">
      <label>To</label>
      <input type="date" id="compEnd"/>
    </div>

      <label>WRE</label>
      <select id="compWRE">
        <option value="0">All</option>

        <option value="-1">No WRE</option>
      </select>
    </div>
    <button class="btn" id="compSearchBtn" onclick="fetchCompetitions(1)">Search</button>
  </div>

  <!-- LIST -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">Competitions</h2>
      <div class="section-line"></div>
      <div class="section-count" id="compCount">—</div>

    <div class="tabs">
      <button class="tab active" onclick="setCompTab('all',this)">All</button>
      <button class="tab" onclick="setCompTab('live',this)">🔴 Live</button>
      <button class="tab" onclick="setCompTab('upcoming',this)">Upcoming</button>
      <button class="tab" onclick="setCompTab('finished',this)">Finished</button>
    </div>
    <div id="compGrid" class="comp-grid"></div>
    <div id="compPagination" class="pagination"></div>

</div><!-- /page-competitions -->

<!-- ═══════════════════════════════════════════════ PAGE: ATHLETES ═══ -->
<div class="page" id="page-athletes">

  <div class="controls" style="padding-top:32px">

<!-- DETAIL PANEL (for competitions + athletes) -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<aside class="detail-panel" id="detailPanel">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div id="panelContent"></div>
</aside>

<script>
// ═══════════════════════════════════ UTILS ═══════════════════════════════════
const BASE_COMP  = 'https://api.worldarchery.org/v3/COMPETITIONS/';
const BASE_RANK  = 'https://api.worldarchery.org/v3/WORLDRANKINGS/';
const BASE_ARES  = 'https://api.worldarchery.org/v3/ATHLETERESULTS/';
const BASE_CRES  = 'https://api.worldarchery.org/v3/COUNTRYRESULTS/';
const PHOTO_BASE = 'https://extranet.worldarchery.org/ProfilePictures/?Id=';

function formatDate(d){
  if(!d) return '—';
  return new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'});
}
function getStatus(c){
  if(c.IsLive) return{label:'LIVE',cls:'badge-live'};
  const today=new Date(); today.setHours(0,0,0,0);
  const s=new Date(c.DFrom), e=new Date(c.DTo);
  if(s>today) return{label:'Upcoming',cls:'badge-upcoming'};
  if(e<today) return{label:'Finished',cls:'badge-finished'};
  return{label:'Ongoing',cls:'badge-live'};
}
function athleteName(a){
  if(!a) return '—';
  return a.WNameOrd ? `${a.FName} ${a.GName}` : `${a.GName} ${a.FName}`;
}
function initials(a){
  if(!a) return '?';
  const parts=athleteName(a).split(' ');
  return parts.map(p=>p[0]||'').join('').slice(0,2).toUpperCase();
}
function rankChange(r,ro){
  if(!ro||ro===r) return `<span class="rank-change rank-same">→</span>`;
  if(r<ro) return `<span class="rank-change rank-up">▲${ro-r}</span>`;
  return `<span class="rank-change rank-down">▼${r-ro}</span>`;
}
function medalRankCls(r){
  if(r===1) return 'gold-medal';
  if(r===2) return 'silver-medal';
  if(r===3) return 'bronze-medal';
  return '';
}

// ═══════════════════════════════════ NAV ═══════════════════════════════════
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='countries' && !document.getElementById('recordsArea').innerHTML.trim()){
    fetchWorldRecords();
  }
  closePanel();
}

// ═══════════════════════════════════ PANEL ═══════════════════════════════════
function openPanel(){
  document.getElementById('overlay').classList.add('show');
  document.getElementById('detailPanel').classList.add('open');
}
function closePanel(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('detailPanel').classList.remove('open');
}

// ═══════════════════════════════════ COMPETITIONS ═══════════════════════════
let compTab='all', compPage=1, compTotal=0;
const COMP_RBP=12;

const now=new Date();
document.getElementById('compStart').value=`${now.getFullYear()}-01-01`;
document.getElementById('compEnd').value  =`${now.getFullYear()}-12-31`;
document.getElementById('countryStart').value=`${now.getFullYear()-5}-01-01`;
document.getElementById('countryEnd').value  =`${now.getFullYear()}-12-31`;

function buildCompParams(page){
  const p=new URLSearchParams();
  const search=document.getElementById('compSearch').value.trim();
  const sd=document.getElementById('compStart').value;
  const ed=document.getElementById('compEnd').value;
  const wre=document.getElementById('compWRE').value;
  if(search) p.set('fText',search);
  if(sd) p.set('StartDate',sd);
  if(ed) p.set('EndDate',ed);
  if(wre!=='0') p.set('WorldRankingEvent',wre);
  p.set('Cancelled','-1');
  p.set('SortBy','DATE');
  if(compTab==='live') p.set('Live','true');
  p.set('RBP',COMP_RBP);
  p.set('Page',page-1);
  return p.toString();
}

function compFilterTab(items){
  const today=new Date(); today.setHours(0,0,0,0);
  if(compTab==='all') return items;
  if(compTab==='live') return items.filter(c=>c.IsLive);
  if(compTab==='upcoming') return items.filter(c=>!c.IsLive&&new Date(c.DFrom)>today);
  if(compTab==='finished') return items.filter(c=>!c.IsLive&&new Date(c.DTo)<today);  return items;
}

async function fetchCompetitions(page=1){
  compPage=page;
  const grid=document.getElementById('compGrid');
  const pag=document.getElementById('compPagination');
  grid.innerHTML=`<div class="state-box" style="grid-column:1/-1"><div class="spinner"></div><p>Loading competitions …</p></div>`;
  pag.innerHTML='';
  document.getElementById('compSearchBtn').disabled=true;
  try{
    const res=await fetch(`${BASE_COMP}?${buildCompParams(page)}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const items=data.items||[];
    compTotal=data.pageInfo?.totalResults||items.length;
    const today=new Date(); today.setHours(0,0,0,0);
    document.getElementById('statTotal').textContent=compTotal.toLocaleString('en');
    document.getElementById('statLive').textContent=items.filter(c=>c.IsLive).length;
    document.getElementById('statUpcoming').textContent=items.filter(c=>!c.IsLive&&new Date(c.DFrom)>today).length;
    document.getElementById('statWRE').textContent=items.filter(c=>c.WorldRankingEvent).length;
    const filtered=compFilterTab(items);
    document.getElementById('compCount').textContent=compTotal.toLocaleString('en')+' results';
    if(!filtered.length){
      grid.innerHTML=`<div class="state-box" style="grid-column:1/-1"><svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.5"/><path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><p>No competitions found.</p></div>`;
    } else {
      grid.innerHTML=filtered.map(renderCompCard).join('');
    }
    renderPagination('comp',compTotal,page,COMP_RBP,fetchCompetitions);
  }catch(e){
    grid.innerHTML=`<div class="state-box" style="grid-column:1/-1"><p>Error: ${e.message}</p></div>`;
  }finally{
    document.getElementById('compSearchBtn').disabled=false;
  }
}

function renderCompCard(c){
  const st=getStatus(c);
  const lc=c.IsLive?' live':'';
  const wre=c.WorldRankingEvent?`<span class="badge badge-wre">WRE</span>`:'';
  const cats=[...(c.CatInd||[]).map(x=>x.Code),...(c.CatTeam||[]).map(x=>x.Code)];
  const uc=[...new Set(cats)].slice(0,4);
  return`<div class="comp-card${lc}" onclick="openCompPanel(${c.ID})">
    <div class="comp-card-top">
      <div class="comp-name">${c.Name}</div>
      <div style="display:flex;gap:4px;flex-shrink:0"><span class="badge ${st.cls}">${st.label}</span>${wre}</div>
    </div>
    <div class="comp-level">${c.Level||''}${c.SubLevel?' · '+c.SubLevel:''}</div>
    <div class="comp-meta">
      <div class="comp-meta-item">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 1C4.24 1 2 3.24 2 6c0 3.75 5 8 5 8s5-4.25 5-8c0-2.76-2.24-5-5-5Zm0 6.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z" fill="currentColor" opacity=".6"/></svg>
        ${c.Place||'—'}, ${c.Country||''}
      </div>
      <div class="comp-meta-item">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.2" fill="none" opacity=".6"/><path d="M1 5h12" stroke="currentColor" stroke-width="1.2" opacity=".6"/></svg>
        ${formatDate(c.DFrom)} – ${formatDate(c.DTo)}
      </div>
      ${uc.length?`<div class="comp-meta-item">${uc.map(x=>`<span style="font-size:10px;background:var(--night-light);padding:1px 6px;border-radius:4px;color:var(--muted)">${x}</span>`).join(' ')}</div>`:''}
    </div>
  </div>`;
}

let compCache={};
async function openCompPanel(id){
  openPanel();
  document.getElementById('panelContent').innerHTML=`<div class="state-box"><div class="spinner"></div></div>`;
  try{
    if(!compCache[id]){
      const res=await fetch(`${BASE_COMP}?CompId=${id}&Detailed=true`);
      const data=await res.json();
      compCache[id]=data.items?.[0];
    }
    const c=compCache[id]; if(!c) throw new Error('Not found');
    const st=getStatus(c);
    const phases=c.CatInd?.[0]?.Phases||[];
    const cats=[...new Set([...(c.CatInd||[]).map(x=>x.Code),...(c.CatTeam||[]).map(x=>x.Code)])];
    document.getElementById('panelContent').innerHTML=`
      <div style="font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:8px">${c.Level||''}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1.05;margin-bottom:4px">${c.Name}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:18px">${c.Venue?c.Venue+', ':''}${c.Place||''}, ${c.CountryName||c.Country||''}</div>
      <div style="display:flex;gap:6px;margin-bottom:16px"><span class="badge ${st.cls}">${st.label}</span>${c.WorldRankingEvent?'<span class="badge badge-wre">WRE</span>':''}</div>
      <div class="panel-divider"></div>
      <div style="display:grid;grid-template-columns:80px 1fr;gap:8px">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding-top:2px">Dates</span><span>${formatDate(c.DFrom)} – ${formatDate(c.DTo)}</span>
        ${c.StatusDescription?`<span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding-top:2px">Status</span><span>${c.StatusDescription}</span>`:''}
        ${c.WorldRecordStatus?`<span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding-top:2px">WR Status</span><span style="color:#68D391">✓ World Record Status</span>`:''}
      </div>
      ${cats.length?`<div class="panel-divider"></div><div class="panel-section-title">Categories</div><div style="display:flex;gap:6px;flex-wrap:wrap">${cats.map(x=>`<span class="cat-pill">${x}</span>`).join('')}</div>`:''}
      ${c.Stages?.length?`<div class="panel-divider"></div><div class="panel-section-title">Available Data</div><div style="display:flex;flex-direction:column;gap:6px">${c.Stages.map(s=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:7px 10px;background:var(--night-mid);border-radius:6px;border:1px solid var(--border)"><span>${s}</span><span style="color:#68D391">✓</span></div>`).join('')}</div>`:''}
      ${phases.length?`<div class="panel-divider"></div><div class="panel-section-title">Elimination Rounds (RM)</div><div style="display:flex;flex-direction:column;gap:5px">${phases.map(p=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:7px 10px;background:var(--night-mid);border-radius:6px;border:1px solid var(--border)"><span>${p.Name}</span><span style="${p.Finished?'color:#68D391':'color:var(--muted)'}">${p.Finished?'✓':'○'}</span></div>`).join('')}</div>`:''}
      ${c.Links&&Object.values(c.Links).some(v=>v)?`<div class="panel-divider"></div><div class="panel-section-title">Links</div>${Object.entries(c.Links).filter(([,v])=>v).map(([k,v])=>`<div style="display:flex;gap:8px;margin-bottom:6px"><span style="font-size:11px;font-weight:600;text-transform:uppercase;color:var(--muted);width:60px;flex-shrink:0">${k}</span><a href="${v.startsWith('http')?v:'https://'+v}" target="_blank" style="font-size:13px;color:var(--gold)">${v}</a></div>`).join('')}`:''}
      <div style="height:32px"></div>`;
  }catch(e){
    document.getElementById('panelContent').innerHTML=`<p style="color:var(--muted)">Error: ${e.message}</p>`;
  }
}

function setCompTab(tab,el){
  compTab=tab;
  document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  fetchCompetitions(1);
}

// ═══════════════════════════════════ ATHLETES ═══════════════════════════════
let athletePage=1, athleteTotal=0;
const ATHLETE_RBP=15;

async function fetchAthletes(page=1){
  athletePage=page;
  const grid=document.getElementById('athleteGrid');
  const pag=document.getElementById('athletePagination');
  grid.innerHTML=`<div class="state-box" style="grid-column:1/-1"><div class="spinner"></div><p>Loading world rankings …</p></div>`;
  pag.innerHTML='';
  document.getElementById('athleteSearchBtn').disabled=true;
  document.getElementById('athleteNotice').style.display='none';
  try{
    const cat=document.getElementById('athleteCat').value;
    const search=document.getElementById('athleteSearch').value.trim();
    const country=document.getElementById('athleteCountry').value.trim().toUpperCase();
    const p=new URLSearchParams();
    p.set('CatCode',cat);
    if(search) p.set('fText',search);
    if(country) p.set('Country',country);
    p.set('SortBy','RANKING');
    p.set('RBP',ATHLETE_RBP);
    p.set('Page',page-1);

    const url=`https://api.worldarchery.org/v3/WORLDRANKINGS/?${p.toString()}`;
    const res=await fetch(url);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const items=data.items||[];
    athleteTotal=data.pageInfo?.totalResults||items.length;
    document.getElementById('athleteCount').textContent=athleteTotal.toLocaleString('en')+' athletes ('+cat+')';

    if(!items.length){
      grid.innerHTML=`<div class="state-box" style="grid-column:1/-1"><p>No athletes found.</p></div>`;
    } else {
      grid.innerHTML=items.map(renderAthleteCard).join('');
    }
    renderPagination('athlete',athleteTotal,page,ATHLETE_RBP,fetchAthletes);
  }catch(e){
    grid.innerHTML='';
    const n=document.getElementById('athleteNotice');
    n.style.display='block';
    n.innerHTML=`<strong>Note:</strong> Failed to load rankings. Error: ${e.message}`;
  }finally{
    document.getElementById('athleteSearchBtn').disabled=false;
  }
}

// ═══════════════════════════════════ RECORDS ═══════════════════════════════════
const BASE_REC = 'https://api.worldarchery.org/v3/RECORDS/';

// Map record level IDs to display labels
const REC_LEVEL_LABELS = {1:'World Record',2:'Olympic Record',3:'World Cup Record',5:'World Championships Record'};

// Cat code → readable label
const CAT_LABELS = {
  RM:'Recurve Men',RW:'Recurve Women',CM:'Compound Men',CW:'Compound Women',
  RM10:'Recurve Men Indoor',RW10:'Recurve Women Indoor',
  CM10:'Compound Men Indoor',CW10:'Compound Women Indoor',
  BM:'Barebow Men',BW:'Barebow Women',
};
function catLabel(c){return CAT_LABELS[c]||c;}

// Group records by Discipline then Category
function groupRecords(items){
  const groups={};
  items.forEach(r=>{
    const disc=r.DisDescr||r.Dis||'Other';
    const cat=r.CatCode||r.Cat||'';
    const key=`${disc}||${cat}`;
    if(!groups[key]) groups[key]={disc,cat,label:catLabel(cat),items:[]};
    groups[key].items.push(r);
  });
  return Object.values(groups).sort((a,b)=>a.disc.localeCompare(b.disc)||a.cat.localeCompare(b.cat));
}

function recTableRows(items){
  return items.map(r=>{
    const holders = r.Athletes?.map(a=>
      a.WNameOrd ? `${a.FName} ${a.GName}` : `${a.GName} ${a.FName}`
    ).join(' / ') || r.AthleteName || '—';
    const noc = r.Athletes?.[0]?.NOC || r.NOC || '';
    const event = r.EventDescr || r.Event || '—';
    const score = r.Score ?? r.Pts ?? '—';
    const place = r.Place ? `${r.Place}${r.Country?' ('+r.Country+')':''}` : (r.CompName||'');
    const date  = r.Date ? formatDate(r.Date) : (r.DFrom ? formatDate(r.DFrom) : '—');
    const isTeam = r.IsTeam || (r.Athletes?.length > 1);
    return `<tr>
      <td class="event-cell">${event}${isTeam?' <span style="font-size:10px;color:var(--muted)">(Team)</span>':''}</td>
      <td class="score-cell">${score}</td>
      <td>${holders}</td>
      <td class="meta-cell">${noc}</td>
      <td class="meta-cell">${place}</td>
      <td class="date-cell">${date}</td>
    </tr>`;
  }).join('');
}

function renderRecordTable(groups, title, subtitle){
  if(!groups.length) return `<div class="state-box" style="padding:40px"><p>No records found.</p></div>`;
  return `
    <div class="records-section">
      <div style="margin-bottom:24px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.04em">${title}</div>
        ${subtitle?`<div style="font-size:13px;color:var(--muted);margin-top:4px">${subtitle}</div>`:''}
      </div>
      ${groups.map(g=>`
        <div class="rec-group">
          <div class="rec-group-title">
            ${g.label||g.cat}
            <span class="rec-group-disc">${g.disc}</span>
          </div>
          <div style="overflow-x:auto">
            <table class="rec-table">
              <thead><tr>
                <th>Event</th><th>Score</th><th>Athlete(s)</th>
                <th>NOC</th><th>Competition / Location</th><th>Date</th>
              </tr></thead>
              <tbody>${recTableRows(g.items)}</tbody>
            </table>
          </div>
        </div>`).join('')}
    </div>`;
}

let recordMode = 'world';

// ── World Records ──
async function fetchWorldRecords(){
  const level  = document.getElementById('wrLevel').value;
  const catCode= document.getElementById('wrCat').value;
  const area   = document.getElementById('recordsArea');
  area.innerHTML=`<div class="records-section"><div class="state-box"><div class="spinner"></div><p>Loading records …</p></div></div>`;
  try{
    const p = new URLSearchParams();
    p.set('RecordLevelId', level);
    if(catCode) p.set('CatCode', catCode);
    p.set('RBP','All');
    const res = await fetch(`${BASE_REC}?${p.toString()}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const items = data.items||[];
    const groups = groupRecords(items);
    const levelLabel = REC_LEVEL_LABELS[level]||`Level ${level}`;
    area.innerHTML = renderRecordTable(groups, levelLabel+'s', `${items.length} records across all disciplines`);
  }catch(e){
    area.innerHTML=`<div class="records-section"><div class="state-box"><p>Error: ${e.message}</p></div></div>`;
  }
}

// ── National Records ──
function quickNoc(noc){
  document.getElementById('nrNoc').value=noc;
  fetchNationalRecords();
}

async function fetchNationalRecords(){
  const noc    = document.getElementById('nrNoc').value.trim().toUpperCase();
  const catCode= document.getElementById('nrCat').value;
  if(!noc){ alert('Please enter a NOC code (e.g. GER)'); return; }
  const area = document.getElementById('recordsArea');
  area.innerHTML=`<div class="records-section"><div class="state-box"><div class="spinner"></div><p>Loading national records for ${noc} …</p></div></div>`;
  try{
    const p = new URLSearchParams();
    p.set('NOC', noc);           // national record level filter
    p.set('RecordLevelId', '4'); // Level 4 = National Record in WA system
    if(catCode) p.set('CatCode', catCode);
    p.set('RBP','All');
    const res = await fetch(`${BASE_REC}?${p.toString()}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const items = data.items||[];

    // Also try fetching with Noc param if NOC returns nothing
    if(!items.length){
      const p2 = new URLSearchParams();
      p2.set('Noc', noc);
      p2.set('RecordLevelId','4');
      if(catCode) p2.set('CatCode', catCode);
      p2.set('RBP','All');
      const res2 = await fetch(`${BASE_REC}?${p2.toString()}`);
      if(res2.ok){
        const data2 = await res2.json();
        const items2 = data2.items||[];
        if(items2.length){
          const groups2 = groupRecords(items2);
          area.innerHTML = renderRecordTable(groups2, `National Records — ${noc}`, `${items2.length} records`);
          return;
        }
      }
    }

    if(!items.length){
      area.innerHTML=`<div class="records-section"><div class="state-box"><p>No national records found for <strong>${noc}</strong>.<br><span style="font-size:12px">This may mean no national records are registered in the World Archery system for this country, or the NOC code is incorrect.</span></p></div></div>`;
      return;
    }
    const groups = groupRecords(items);
    area.innerHTML = renderRecordTable(groups, `National Records — ${noc}`, `${items.length} records`);
  }catch(e){
    area.innerHTML=`<div class="records-section"><div class="state-box"><p>Error: ${e.message}</p></div></div>`;
  }
}

// ═══════════════════════════════════ PAGINATION ═══════════════════════════════
function renderPagination(prefix, total, page, rbp, fetchFn){
  const pages=Math.ceil(total/rbp);
  const pag=document.getElementById(`${prefix}Pagination`);
  if(pages<=1){pag.innerHTML='';return;}
  let html=`<button class="page-btn" onclick="fetchFns['${prefix}'](${page-1})" ${page<=1?'disabled':''}>← Back</button>`;
  const s=Math.max(1,page-2), e=Math.min(pages,page+2);
  if(s>1) html+=`<button class="page-btn" onclick="fetchFns['${prefix}'](1)">1</button>${s>2?'<span class="page-info">…</span>':''}`;
  for(let i=s;i<=e;i++) html+=`<button class="page-btn ${i===page?'active':''}" onclick="fetchFns['${prefix}'](${i})">${i}</button>`;
  if(e<pages) html+=`${e<pages-1?'<span class="page-info">…</span>':''}<button class="page-btn" onclick="fetchFns['${prefix}'](${pages})">${pages}</button>`;
  html+=`<button class="page-btn" onclick="fetchFns['${prefix}'](${page+1})" ${page>=pages?'disabled':''}>Next →</button>`;
  pag.innerHTML=html;
}
